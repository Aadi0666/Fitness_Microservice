spring:
  application:
    name: activity-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/fitnessactivity
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest


server:
  port: 8082

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/


rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking


logging:
   level:
      org.springframework.data.mongodb: DEBUG
      org.mongodb.driver: DEBUG
      org.mongodb.driver.protocol.command: DEBUG  # shows insert commands
      org.mongodb.driver.cluster: OFF             # hides heartbeat noise



